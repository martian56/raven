[package]
name = "raven"
version = "1.2.2"
edition = "2021"
authors = ["martian56"]
description = "A modern programming language with advanced features"
license = "MIT"
repository = "https://github.com/martian56/raven"
homepage = "https://github.com/martian56/raven"
keywords = ["programming", "language", "compiler", "interpreter"]
categories = ["development-tools", "command-line-utilities"]

# Debian package configuration
[package.metadata.deb]
maintainer = "martian56"
copyright = "2024 martian56"
license-file = ["LICENSE"]
depends = "$auto"
section = "devel"
priority = "optional"
assets = [
    ["target/release/raven", "usr/bin/", "755"],
    ["target/release/rvpm", "usr/bin/", "755"],
    ["README.md", "usr/share/doc/raven/", "644"],
    ["docs/syntax.md", "usr/share/doc/raven/", "644"],
    ["lib/math.rv", "usr/share/raven/lib/", "644"],
    ["lib/collections.rv", "usr/share/raven/lib/", "644"],
    ["lib/string.rv", "usr/share/raven/lib/", "644"],
    ["lib/time.rv", "usr/share/raven/lib/", "644"],
    ["lib/filesystem.rv", "usr/share/raven/lib/", "644"],
    ["lib/network.rv", "usr/share/raven/lib/", "644"],
    ["lib/testing.rv", "usr/share/raven/lib/", "644"],
]
extended-description = """\
Raven is a modern programming language with advanced features.
Includes the standard library and rvpm package manager.
"""

# RPM package configuration (cargo-generate-rpm)
[package.metadata.generate-rpm]
license = "MIT"
summary = "A modern programming language with advanced features"
assets = [
    { source = "target/release/raven", dest = "/usr/bin/raven", mode = "755" },
    { source = "target/release/rvpm", dest = "/usr/bin/rvpm", mode = "755" },
    { source = "README.md", dest = "/usr/share/doc/raven/", mode = "644", doc = true },
    { source = "docs/syntax.md", dest = "/usr/share/doc/raven/", mode = "644", doc = true },
    { source = "lib/math.rv", dest = "/usr/share/raven/lib/", mode = "644" },
    { source = "lib/collections.rv", dest = "/usr/share/raven/lib/", mode = "644" },
    { source = "lib/string.rv", dest = "/usr/share/raven/lib/", mode = "644" },
    { source = "lib/time.rv", dest = "/usr/share/raven/lib/", mode = "644" },
    { source = "lib/filesystem.rv", dest = "/usr/share/raven/lib/", mode = "644" },
    { source = "lib/network.rv", dest = "/usr/share/raven/lib/", mode = "644" },
    { source = "lib/testing.rv", dest = "/usr/share/raven/lib/", mode = "644" },
]

[dependencies]
clap = "4.1"
chrono = "0.4"

[profile.release]
opt-level = 1
lto = true
codegen-units = 1


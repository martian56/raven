name: Raven CI

on:
  push:
    branches: [ "main", "v1.x-maintenance", "v2.x" ]
    paths:
      - "src/**"
      - "lib/**"
      - "examples/**"
      - "tests/**"
      - "raven-runtime/**"
      - "benchmarks/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ "main", "v1.x-maintenance", "v2.x" ]
    paths:
      - "src/**"
      - "lib/**"
      - "examples/**"
      - "tests/**"
      - "raven-runtime/**"
      - "benchmarks/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
    - uses: actions/checkout@v4
    - name: Format
      run: cargo fmt --check

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
    - uses: actions/checkout@v4
    - name: Lint
      run: cargo clippy --workspace --all-targets

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --workspace --verbose
    - name: Run tests
      run: cargo test --workspace --verbose

  benchmark:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
    - uses: actions/checkout@v4
    - name: Build release raven and runtime
      run: |
        cargo build --release --bin raven
        cargo build --release -p raven-runtime
    - name: Compile-time benchmark
      env:
        RAVEN_BENCH_SKIP_BUILD: "1"
      run: bash benchmarks/compile-time/run.sh
